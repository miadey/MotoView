# ============================================================================
# MotoView — store release pipeline (Slice 11)
# ============================================================================
# Builds the native core for iOS + Android, then signs and uploads via Fastlane
# (iOS -> TestFlight/App Store) and Gradle Play Publisher (Android -> Play
# internal track). EVERYTHING that touches an account is GATED ON SECRETS — no
# credential, key, or account id lives in this file.
#
# REQUIRED REPOSITORY SECRETS (the workflow no-ops the upload steps if a secret
# is absent, so a fork without credentials still builds the core):
#   Reproducible-build pin:
#     PINNED_BRAIN_SHA256       expected sha256 of the optimized client wasm
#   iOS / Fastlane:
#     ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_CONTENT   (App Store Connect API key)
#     MATCH_GIT_URL, MATCH_PASSWORD, MATCH_GIT_BASIC_AUTHORIZATION
#     FASTLANE_TEAM_ID, FASTLANE_ITC_TEAM_ID, APP_IDENTIFIER
#     XCODE_WORKSPACE, XCODE_SCHEME   (or set as env if not secret)
#   Android / Play:
#     PLAY_SERVICE_ACCOUNT_JSON     (base64 of the service-account JSON)
#     ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#     ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# EXTERNAL PREREQUISITES (cannot be satisfied by this repo — the USER provides):
#   * Apple Developer Program ($99/yr) + App Store Connect app record + a match
#     certs repo. The macOS runner here uses GitHub's image which DOES have full
#     Xcode (unlike the local build machine, which is Command-Line-Tools only).
#   * Google Play Console ($25) with the app already created + a Play service
#     account with release permissions.
#   * App Attest (Apple) and Play Integrity (Google) projects — see
#     clients/ios/APP_ATTEST.md and clients/android/PLAY_INTEGRITY.md.
# ============================================================================
name: release

on:
  # Tag-driven release. Push a tag like v0.1.0 to trigger.
  push:
    tags:
      - "v*"
  # Manual dispatch with a track selector.
  workflow_dispatch:
    inputs:
      ios_lane:
        description: "iOS Fastlane lane (beta or release)"
        required: true
        default: "beta"
      android_track:
        description: "Play track (internal/alpha/beta/production)"
        required: true
        default: "internal"

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # 1. Reproducible client-wasm build + module-hash gate. Runs on every release;
  #    fails the pipeline if the brain hash drifted from the pinned value.
  # --------------------------------------------------------------------------
  reproducible-hash:
    runs-on: ubuntu-latest
    outputs:
      brain_sha256: ${{ steps.hash.outputs.sha }}
    env:
      PINNED_BRAIN_SHA256: ${{ secrets.PINNED_BRAIN_SHA256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Reproducible build + emit module hash
        id: hash
        run: |
          out=$(bash tools/release/reproducible-build.sh --json)
          echo "$out"
          sha=$(printf '%s' "$out" | python3 -c 'import sys,json;print(json.load(sys.stdin)["opt_sha256"])')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Verify against pinned hash (if pinned)
        if: ${{ env.PINNED_BRAIN_SHA256 != '' }}
        run: bash tools/release/reproducible-build.sh --check "$PINNED_BRAIN_SHA256"

  # --------------------------------------------------------------------------
  # 2. iOS — build the core (cargo) + assemble/sign/upload via Fastlane.
  #    Runs on a macOS runner (GitHub's image has FULL Xcode).
  # --------------------------------------------------------------------------
  ios:
    needs: reproducible-hash
    runs-on: macos-14
    env:
      APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
      XCODE_WORKSPACE: ${{ secrets.XCODE_WORKSPACE }}
      XCODE_SCHEME: ${{ secrets.XCODE_SCHEME }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Build the native core (cargo) + xcframework
        run: bash tools/native-build.sh ios
      - name: Set up Ruby + Fastlane
        if: ${{ env.ASC_KEY_ID != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
      - name: Install Fastlane
        if: ${{ env.ASC_KEY_ID != '' }}
        run: gem install fastlane --no-document
      - name: Fastlane lane (gated on credentials)
        if: ${{ env.ASC_KEY_ID != '' }}
        working-directory: clients/ios
        run: |
          lane="${{ github.event.inputs.ios_lane || 'beta' }}"
          fastlane "$lane"
      - name: Skip notice (no credentials)
        if: ${{ env.ASC_KEY_ID == '' }}
        run: echo "ASC_KEY_ID secret absent -> built core only; upload skipped."

  # --------------------------------------------------------------------------
  # 3. Android — build the core (cargo-ndk) + Gradle Play Publisher.
  # --------------------------------------------------------------------------
  android:
    needs: reproducible-hash
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      ANDROID_VERSION_NAME: ${{ github.ref_name }}
      PLAY_TRACK: ${{ github.event.inputs.android_track || 'internal' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Rust Android targets + cargo-ndk
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;26.3.11579264" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
      - name: Build the native core (cargo-ndk)
        run: bash tools/native-build.sh android
      - name: Decode signing keystore (gated on secret)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
      - name: Decode Play service-account JSON (gated on secret)
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" | base64 --decode > "$RUNNER_TEMP/play.json"
          echo "PLAY_JSON_FILE=$RUNNER_TEMP/play.json" >> "$GITHUB_ENV"
      - name: Build App Bundle
        working-directory: clients/android
        run: ./gradlew :app:bundleRelease
      - name: Publish to Play (gated on service account)
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        working-directory: clients/android
        run: ./gradlew :app:publishReleaseBundle
      - name: Skip notice (no service account)
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON == '' }}
        run: echo "PLAY_SERVICE_ACCOUNT_JSON secret absent -> built .aab only; upload skipped."

# ============================================================================
# MotoView — desktop MotokoStudio build & publish (R20)
# ============================================================================
# Builds the WEBVIEW-FREE native desktop app (apps/studio/native, the standalone
# egui/wgpu+Metal crate) into a distributable macOS .app + .dmg via the PROVEN
# local packager apps/studio/native/bundle.sh, then uploads the .dmg as a CI
# artifact and — on a tag push — attaches it to a GitHub Release.
#
# This is SEPARATE from release.yml (the iOS/Android store pipeline). It uses a
# DISTINCT trigger (studio-v* tags, NOT v*) so the two workflows never fire on
# the same tag.
#
# SIGNING (all OPTIONAL — nothing is required for the runnable artifact):
#   By default bundle.sh AD-HOC signs the app (codesign --sign -). No Apple
#   account, no cert, NO repository secrets — so a fork still produces a
#   runnable .dmg. Recipients open it once via right-click -> Open.
#
#   For warning-free distribution you may configure these OPTIONAL repository
#   secrets to switch on real Developer ID signing + (optionally) notarization.
#   The Apple Developer ID certificate is something only YOU can provide — it
#   needs a paid Apple Developer Program membership ($99/yr); it cannot be
#   synthesized here:
#     MACOS_CERTIFICATE_P12        base64 of your "Developer ID Application" .p12
#     MACOS_CERTIFICATE_PASSWORD   password that protects that .p12
#     MACOS_SIGN_IDENTITY          e.g. "Developer ID Application: Name (TEAMID)"
#     MACOS_KEYCHAIN_PASSWORD      (optional) password for the temp build keychain
#     MACOS_NOTARYTOOL_PROFILE     (optional) name of a notarytool keychain
#                                  profile already stored on the runner; only
#                                  set this if your bootstrap also runs
#                                  `xcrun notarytool store-credentials`. If
#                                  empty, the build is signed but NOT notarized.
#
# NO credential, key, password, or identity literal lives in this file — every
# sensitive value is a ${{ secrets.* }} reference, mirrored into a JOB-LEVEL env
# first (GitHub forbids the secrets context in a step-level `if:`), then branched
# on via that env var. This matches the pattern release.yml uses.
# ============================================================================
name: studio-desktop

on:
  # Desktop-specific tag trigger. Push a tag like studio-v0.1.0 to build +
  # publish. Deliberately NOT "v*" so this never collides with release.yml.
  push:
    tags:
      - "studio-v*"
  # Manual run (builds + uploads the artifact; the Release step is tag-only).
  workflow_dispatch:

permissions:
  contents: write # needed to create/attach the GitHub Release on a tag push

jobs:
  build-desktop:
    # macos-14 == Apple Silicon (arm64). The universal arm64+x86_64 cross-build
    # was PROVEN on Apple Silicon (apps/studio/native/bundle.sh lipo-s the two
    # slices), so we match that host: the native arm64 slice is a same-arch
    # build and only the x86_64 slice cross-compiles — the orientation the
    # local proof exercised. (An Intel runner would invert that and exercise an
    # untested cross direction.)
    runs-on: macos-14
    env:
      # Mirror secrets into job-level env: GitHub does NOT allow the secrets
      # context directly in a step-level `if:`, so we branch on these env vars.
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_NOTARYTOOL_PROFILE: ${{ secrets.MACOS_NOTARYTOOL_PROFILE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + both macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo + native build target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/studio/native/target
            apps/studio/native/icongen/target
          key: studio-desktop-${{ runner.os }}-${{ hashFiles('apps/studio/native/Cargo.lock', 'apps/studio/native/icongen/Cargo.lock') }}
          restore-keys: |
            studio-desktop-${{ runner.os }}-

      # ---- Developer ID path (GATED ON SECRETS) ----------------------------
      # Only runs if a cert secret is present. Imports the .p12 into a fresh
      # temporary keychain via the standard create-keychain / import /
      # set-key-partition-list sequence so the next step's `bundle.sh --sign`
      # can find the identity. Skipped entirely (-> ad-hoc) if no cert secret.
      - name: Import Developer ID certificate (gated on secret)
        if: ${{ env.MACOS_CERTIFICATE_P12 != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/studio-signing.keychain-db"
          KEYCHAIN_PW="${MACOS_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          # Materialize the .p12 from the base64 secret (never echoed).
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          # Standard temporary-keychain import sequence.
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first on the search list so codesign finds the
          # cert, keeping the user's existing keychains after it. Read the
          # current list into an array so word-splitting is explicit/safe.
          EXISTING=()
          while IFS= read -r kc; do
            kc="${kc//\"/}"          # strip the surrounding quotes security prints
            kc="${kc#"${kc%%[![:space:]]*}"}"   # trim leading whitespace
            [ -n "$kc" ] && EXISTING+=("$kc")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KEYCHAIN" "${EXISTING[@]}"
          rm -f "$CERT_PATH"

          echo "Developer ID certificate imported into the temporary keychain."

      - name: Build MotokoStudio.app + .dmg (proven bundle.sh flow)
        run: |
          set -euo pipefail
          if [ -n "$MACOS_CERTIFICATE_P12" ] && [ -n "$MACOS_SIGN_IDENTITY" ]; then
            # Real Developer ID path: signed, optionally notarized.
            if [ -n "$MACOS_NOTARYTOOL_PROFILE" ]; then
              echo "==> Signed + notarized build (Developer ID + notarytool profile)."
              bash apps/studio/native/bundle.sh \
                --sign "$MACOS_SIGN_IDENTITY" \
                --notarize-profile "$MACOS_NOTARYTOOL_PROFILE"
            else
              echo "==> Signed build (Developer ID; NOT notarized — no notarytool profile)."
              bash apps/studio/native/bundle.sh --sign "$MACOS_SIGN_IDENTITY"
            fi
          else
            # Default: AD-HOC. No secrets needed; produces a runnable .dmg.
            echo "==> Ad-hoc build (no Developer ID secret configured)."
            bash apps/studio/native/bundle.sh
          fi

      - name: Zip the .app bundle
        run: |
          set -euo pipefail
          ditto -c -k --keepParent \
            apps/studio/native/dist/MotokoStudio.app \
            apps/studio/native/dist/MotokoStudio-app.zip

      - name: Upload .dmg + zipped .app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MotokoStudio-macos
          path: |
            apps/studio/native/dist/MotokoStudio.dmg
            apps/studio/native/dist/MotokoStudio-app.zip
          if-no-files-found: error

      # ---- Release attach (TAG PUSH ONLY) ----------------------------------
      - name: Attach .dmg to the GitHub Release (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/studio-v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/studio/native/dist/MotokoStudio.dmg
            apps/studio/native/dist/MotokoStudio-app.zip
          fail_on_unmatched_files: true
